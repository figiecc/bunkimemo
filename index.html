<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分岐メモ</title>

<style>
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background: #eef1f4;
margin: 0;
padding: 0;
display: flex;
justify-content: center;
}

.app-container {
width: 100%;
max-width: 420px;
background: white;
min-height: 100vh;
box-shadow: 0 0 12px rgba(0,0,0,0.08);
}

header {
background: #2c3e50;
color: white;
padding: 18px;
text-align: center;
font-size: 20px;
font-weight: bold;
}

main {
padding: 20px;
}

.subtitle {
font-size: 14px;
color: #666;
margin-bottom: 24px;
}

.form-block {
margin-bottom: 18px;
}

label {
display: block;
font-size: 14px;
font-weight: bold;
margin-bottom: 8px;
}

select,
textarea {
width: 100%;
box-sizing: border-box;
font-size: 15px;
padding: 12px;
border: 1px solid #ccd3da;
border-radius: 10px;
}

textarea {
min-height: 140px;
resize: vertical;
line-height: 1.6;
}

button {
width: 100%;
padding: 14px;
border: none;
border-radius: 12px;
background: #2c3e50;
color: white;
font-size: 16px;
font-weight: bold;
cursor: pointer;
margin-bottom: 8px;
}

button:disabled {
background: #9aa6b2;
cursor: not-allowed;
}

.reset-btn {
background: #8e9aa6;
}

.status {
font-size: 13px;
color: #666;
margin-top: 8px;
}

.result-card {
margin-top: 24px;
padding: 16px;
border-radius: 12px;
background: #f4f6f8;
}

.option-block {
margin-top: 14px;
padding: 14px;
background: white;
border-radius: 10px;
border: 1px solid #d9e0e6;
}

.option-title {
font-weight: bold;
margin-bottom: 10px;
}

.section-title {
font-size: 13px;
font-weight: bold;
margin-top: 10px;
}

.section-text {
font-size: 14px;
margin-bottom: 4px;
line-height: 1.6;
}

.timeline {
font-size: 14px;
margin-bottom: 4px;
line-height: 1.6;
}

.compare-wrap {
overflow-x: auto;
}

.compare-table {
margin-top: 24px;
width: 100%;
border-collapse: collapse;
font-size: 13px;
min-width: 620px;
}

.compare-table th,
.compare-table td {
border: 1px solid #d9e0e6;
padding: 6px;
text-align: left;
vertical-align: top;
}

.compare-table th {
background: #f1f4f7;
}

.action-block {
margin-top: 24px;
padding: 16px;
background: #ffffff;
border-radius: 10px;
border: 1px solid #d9e0e6;
}

.note {
margin-top: 16px;
font-size: 13px;
color: #555;
line-height: 1.6;
}
</style>
</head>

<body>

<div class="app-container">

<header>
分岐メモ
</header>

<main>

<p class="subtitle">
悩みを選択肢・時間軸・影響範囲に分けて整理します。
</p>

<div class="form-block">
<label>相談ジャンル</label>
<select id="genre">
<option value="人間関係">人間関係</option>
<option value="進路・キャリア">進路・キャリア</option>
<option value="日常の重要判断">日常の重要判断</option>
</select>
</div>

<div class="form-block">
<label>悩み・迷っていること</label>
<textarea id="problem" placeholder="例：サークルを続けるか辞めるか迷っている"></textarea>
</div>

<button id="analyzeBtn" onclick="analyzeWithAI()">
AIで分析する
</button>

<button class="reset-btn" onclick="resetData()">
保存内容を削除
</button>

<div id="status" class="status"></div>
<div id="result"></div>

</main>

</div>

<script>
const API_URL = "https://bunkimemo-api.figie-cc.workers.dev";

window.onload = function() {
const saved = localStorage.getItem("bunkimemo");

if (saved) {
const data = JSON.parse(saved);
document.getElementById("genre").value = data.genre || "人間関係";
document.getElementById("problem").value = data.problem || "";
document.getElementById("result").innerHTML = data.result || "";
document.getElementById("status").textContent = data.status || "";
}
};

function saveData(genre, problem, resultHTML, statusText) {
localStorage.setItem("bunkimemo", JSON.stringify({
genre,
problem,
result: resultHTML,
status: statusText
}));
}

function resetData() {
localStorage.removeItem("bunkimemo");
document.getElementById("problem").value = "";
document.getElementById("result").innerHTML = "";
document.getElementById("status").textContent = "";
alert("保存内容を削除しました");
}

async function analyzeWithAI() {
const genre = document.getElementById("genre").value;
const problem = document.getElementById("problem").value.trim();
const button = document.getElementById("analyzeBtn");
const status = document.getElementById("status");
const result = document.getElementById("result");

if (problem === "") {
alert("悩みを入力してください");
return;
}

button.disabled = true;
button.textContent = "分析中...";
status.textContent = "AIが選択肢を整理しています。";
result.innerHTML = "";

try {
const response = await fetch(API_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
genre,
problem
})
});

const data = await response.json();

if (!response.ok) {
throw new Error(data.error || "AI分析に失敗しました。");
}

const html = renderResult(data.result);
const statusText = `残り利用回数：${data.remaining}回`;

result.innerHTML = html;
status.textContent = statusText;

saveData(genre, problem, html, statusText);

} catch (error) {
status.textContent = "";
result.innerHTML = `
<div class="result-card">
<div class="section-title">エラー</div>
<div class="section-text">${escapeHTML(error.message)}</div>
</div>
`;
} finally {
button.disabled = false;
button.textContent = "AIで分析する";
}
}

function renderResult(data) {
let html = `<div class="result-card">`;

data.options.forEach(option => {
html += `
<div class="option-block">
<div class="option-title">${escapeHTML(option.title)}</div>

<div class="section-title">時間軸</div>
<div class="timeline">1週間後：${escapeHTML(option.timeline.oneWeek)}</div>
<div class="timeline">1か月後：${escapeHTML(option.timeline.oneMonth)}</div>
<div class="timeline">半年後：${escapeHTML(option.timeline.sixMonths)}</div>
<div class="timeline">1年後：${escapeHTML(option.timeline.oneYear)}</div>

<div class="section-title">メリット</div>
<div class="section-text">${escapeHTML(option.impact.merit)}</div>

<div class="section-title">リスク</div>
<div class="section-text">${escapeHTML(option.impact.risk)}</div>

<div class="section-title">人間関係への影響</div>
<div class="section-text">${escapeHTML(option.impact.relation)}</div>

<div class="section-title">お金への影響</div>
<div class="section-text">${escapeHTML(option.impact.money)}</div>

<div class="section-title">メンタルへの影響</div>
<div class="section-text">${escapeHTML(option.impact.mental)}</div>

<div class="section-title">後悔しやすい点</div>
<div class="section-text">${escapeHTML(option.impact.regret)}</div>
</div>
`;
});

html += renderCompareTable(data.options);
html += renderActionBlock(data);
html += `</div>`;

return html;
}

function renderCompareTable(options) {
return `
<div class="compare-wrap">
<table class="compare-table">
<tr>
<th>観点</th>
<th>${escapeHTML(options[0].title)}</th>
<th>${escapeHTML(options[1].title)}</th>
<th>${escapeHTML(options[2].title)}</th>
</tr>

<tr>
<th>メリット</th>
<td>${escapeHTML(options[0].impact.merit)}</td>
<td>${escapeHTML(options[1].impact.merit)}</td>
<td>${escapeHTML(options[2].impact.merit)}</td>
</tr>

<tr>
<th>リスク</th>
<td>${escapeHTML(options[0].impact.risk)}</td>
<td>${escapeHTML(options[1].impact.risk)}</td>
<td>${escapeHTML(options[2].impact.risk)}</td>
</tr>

<tr>
<th>人間関係</th>
<td>${escapeHTML(options[0].impact.relation)}</td>
<td>${escapeHTML(options[1].impact.relation)}</td>
<td>${escapeHTML(options[2].impact.relation)}</td>
</tr>

<tr>
<th>お金</th>
<td>${escapeHTML(options[0].impact.money)}</td>
<td>${escapeHTML(options[1].impact.money)}</td>
<td>${escapeHTML(options[2].impact.money)}</td>
</tr>

<tr>
<th>メンタル</th>
<td>${escapeHTML(options[0].impact.mental)}</td>
<td>${escapeHTML(options[1].impact.mental)}</td>
<td>${escapeHTML(options[2].impact.mental)}</td>
</tr>

<tr>
<th>後悔</th>
<td>${escapeHTML(options[0].impact.regret)}</td>
<td>${escapeHTML(options[1].impact.regret)}</td>
<td>${escapeHTML(options[2].impact.regret)}</td>
</tr>
</table>
</div>
`;
}

function renderActionBlock(data) {
return `
<div class="action-block">
<div class="section-title">今すぐ確認すること</div>
<div class="section-text">
${data.checkNow.map(item => `・${escapeHTML(item)}`).join("<br>")}
</div>

<div class="section-title">次に取る行動</div>
<div class="section-text">
${data.nextActions.map(item => `・${escapeHTML(item)}`).join("<br>")}
</div>

<div class="note">
${escapeHTML(data.note || "これは未来予測ではなく、判断材料を整理するための参考情報です。")}
</div>
</div>
`;
}

function escapeHTML(str) {
return String(str)
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#039;");
}
</script>

</body>
</html>
