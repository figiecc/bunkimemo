<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分岐メモ</title>

<style>
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background: #eef1f4;
margin: 0;
padding: 0;
display: flex;
justify-content: center;
}

.app-container {
width: 100%;
max-width: 420px;
background: white;
min-height: 100vh;
box-shadow: 0 0 12px rgba(0,0,0,0.08);
}

header {
background: #2c3e50;
color: white;
padding: 18px;
text-align: center;
font-size: 20px;
font-weight: bold;
}

main {
padding: 20px;
}

.subtitle {
font-size: 14px;
color: #666;
margin-bottom: 24px;
}

.form-block {
margin-bottom: 18px;
}

label {
display: block;
font-size: 14px;
font-weight: bold;
margin-bottom: 8px;
}

select,
textarea {
width: 100%;
box-sizing: border-box;
font-size: 15px;
padding: 12px;
border: 1px solid #ccd3da;
border-radius: 10px;
}

textarea {
min-height: 140px;
resize: vertical;
line-height: 1.6;
}

button {
width: 100%;
padding: 14px;
border: none;
border-radius: 12px;
background: #2c3e50;
color: white;
font-size: 16px;
font-weight: bold;
cursor: pointer;
margin-bottom: 8px;
}

button:disabled {
background: #9aa6b2;
cursor: not-allowed;
}

.reset-btn {
background: #8e9aa6;
}

.status {
font-size: 13px;
color: #666;
margin-top: 8px;
}

.result-card {
margin-top: 24px;
padding: 16px;
border-radius: 12px;
background: #f4f6f8;
}

.option-block {
margin-top: 14px;
padding: 14px;
background: white;
border-radius: 10px;
border: 1px solid #d9e0e6;
}

.option-title {
font-weight: bold;
margin-bottom: 10px;
}

.section-title {
font-size: 13px;
font-weight: bold;
margin-top: 10px;
}

.section-text,
.timeline {
font-size: 14px;
margin-bottom: 4px;
line-height: 1.6;
}

.compare-wrap {
overflow-x: auto;
}

.compare-table {
margin-top: 24px;
width: 100%;
border-collapse: collapse;
font-size: 13px;
min-width: 620px;
}

.compare-table th,
.compare-table td {
border: 1px solid #d9e0e6;
padding: 6px;
text-align: left;
vertical-align: top;
}

.compare-table th {
background: #f1f4f7;
}

.action-block {
margin-top: 24px;
padding: 16px;
background: #ffffff;
border-radius: 10px;
border: 1px solid #d9e0e6;
}

.note {
margin-top: 16px;
font-size: 13px;
color: #555;
line-height: 1.6;
}
</style>
</head>

<body>

<div class="app-container">

<header>分岐メモ</header>

<main>

<p class="subtitle">
悩みを選択肢・時間軸・影響範囲に分けて整理します。
</p>

<div class="form-block">
<label for="genre">相談ジャンル</label>
<select id="genre">
<option value="人間関係">人間関係</option>
<option value="進路・キャリア">進路・キャリア</option>
<option value="日常の重要判断">日常の重要判断</option>
</select>
</div>

<div class="form-block">
<label for="problem">悩み・迷っていること</label>
<textarea id="problem" placeholder="例：サークルを続けるか辞めるか迷っている"></textarea>
</div>

<button id="analyzeBtn" type="button">AIで分析する</button>
<button class="reset-btn" type="button" id="resetBtn">保存内容を削除</button>

<div id="status" class="status"></div>
<div id="result"></div>

</main>
</div>

<script>
const API_URL = "https://bunkimemo-api.figie-cc.workers.dev";

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("analyzeBtn").addEventListener("click", analyzeWithAI);
  document.getElementById("resetBtn").addEventListener("click", resetData);

  const saved = localStorage.getItem("bunkimemo");
  if (saved) {
    try {
      const data = JSON.parse(saved);
      document.getElementById("genre").value = data.genre || "人間関係";
      document.getElementById("problem").value = data.problem || "";
      document.getElementById("result").innerHTML = data.result || "";
      document.getElementById("status").textContent = data.status || "";
    } catch (e) {
      localStorage.removeItem("bunkimemo");
    }
  }
});

function saveData(genre, problem, resultHTML, statusText) {
  localStorage.setItem("bunkimemo", JSON.stringify({
    genre,
    problem,
    result: resultHTML,
    status: statusText
  }));
}

function resetData() {
  localStorage.removeItem("bunkimemo");
  document.getElementById("problem").value = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("status").textContent = "";
  alert("保存内容を削除しました");
}

async function analyzeWithAI() {
  const genre = document.getElementById("genre").value;
  const problem = document.getElementById("problem").value.trim();
  const button = document.getElementById("analyzeBtn");
  const status = document.getElementById("status");
  const result = document.getElementById("result");

  if (problem === "") {
    alert("悩みを入力してください");
    return;
  }

  button.disabled = true;
  button.textContent = "分析中...";
  status.textContent = "AIが選択肢を整理しています。";
  result.innerHTML = "";

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        genre,
        problem
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || data.detail || "AI分析に失敗しました。");
    }

    const normalized = normalizeResult(data);

    if (!normalized || !Array.isArray(normalized.options) || normalized.options.length === 0) {
      throw new Error("AI結果の形式を読み取れませんでした。");
    }

    const html = renderResult(normalized);
    const statusText = `残り利用回数：${data.remaining ?? "不明"}回`;

    result.innerHTML = html;
    status.textContent = statusText;

    saveData(genre, problem, html, statusText);

  } catch (error) {
    status.textContent = "";
    result.innerHTML = `
      <div class="result-card">
        <div class="section-title">エラー</div>
        <div class="section-text">${escapeHTML(error.message)}</div>
      </div>
    `;
  } finally {
    button.disabled = false;
    button.textContent = "AIで分析する";
  }
}

function normalizeResult(data) {
  if (!data) return null;

  let result = data.result || data;

  if (typeof result === "string") {
    try {
      result = JSON.parse(result);
    } catch (e) {
      return null;
    }
  }

  if (result.response) {
    if (typeof result.response === "string") {
      try {
        result = JSON.parse(result.response);
      } catch (e) {
        return null;
      }
    } else if (typeof result.response === "object") {
      result = result.response;
    }
  }

  if (!Array.isArray(result.options)) {
    return null;
  }

  result.options = result.options
    .filter(Boolean)
    .map(normalizeOption)
    .filter(option => option.title);

  result.checkNow = Array.isArray(result.checkNow) ? result.checkNow : [];
  result.nextActions = Array.isArray(result.nextActions) ? result.nextActions : [];
  result.note = result.note || "これは未来予測ではなく、判断材料を整理するための参考情報です。";

  return result;
}

function normalizeOption(option) {
  return {
    title: option.title || "選択肢",
    timeline: {
      oneWeek: option.timeline?.oneWeek || "",
      oneMonth: option.timeline?.oneMonth || "",
      sixMonths: option.timeline?.sixMonths || "",
      oneYear: option.timeline?.oneYear || ""
    },
    impact: {
      merit: option.impact?.merit || "",
      risk: option.impact?.risk || "",
      relation: option.impact?.relation || "",
      money: option.impact?.money || "",
      mental: option.impact?.mental || "",
      regret: option.impact?.regret || ""
    }
  };
}

function renderResult(data) {
  let html = `<div class="result-card">`;

  data.options.forEach(option => {
    html += `
      <div class="option-block">
        <div class="option-title">${escapeHTML(option.title)}</div>

        <div class="section-title">時間軸</div>
        <div class="timeline">1週間後：${escapeHTML(option.timeline.oneWeek)}</div>
        <div class="timeline">1か月後：${escapeHTML(option.timeline.oneMonth)}</div>
        <div class="timeline">半年後：${escapeHTML(option.timeline.sixMonths)}</div>
        <div class="timeline">1年後：${escapeHTML(option.timeline.oneYear)}</div>

        <div class="section-title">メリット</div>
        <div class="section-text">${escapeHTML(option.impact.merit)}</div>

        <div class="section-title">リスク</div>
        <div class="section-text">${escapeHTML(option.impact.risk)}</div>

        <div class="section-title">人間関係への影響</div>
        <div class="section-text">${escapeHTML(option.impact.relation)}</div>

        <div class="section-title">お金への影響</div>
        <div class="section-text">${escapeHTML(option.impact.money)}</div>

        <div class="section-title">メンタルへの影響</div>
        <div class="section-text">${escapeHTML(option.impact.mental)}</div>

        <div class="section-title">後悔しやすい点</div>
        <div class="section-text">${escapeHTML(option.impact.regret)}</div>
      </div>
    `;
  });

  html += renderCompareTable(data.options);
  html += renderActionBlock(data);
  html += `</div>`;

  return html;
}

function renderCompareTable(options) {
  if (!Array.isArray(options) || options.length < 2) {
    return "";
  }

  const headers = options.map(option => `<th>${escapeHTML(option.title)}</th>`).join("");

  const row = (label, getter) => `
    <tr>
      <th>${label}</th>
      ${options.map(option => `<td>${escapeHTML(getter(option))}</td>`).join("")}
    </tr>
  `;

  return `
    <div class="compare-wrap">
      <table class="compare-table">
        <tr>
          <th>観点</th>
          ${headers}
        </tr>
        ${row("メリット", option => option.impact.merit)}
        ${row("リスク", option => option.impact.risk)}
        ${row("人間関係", option => option.impact.relation)}
        ${row("お金", option => option.impact.money)}
        ${row("メンタル", option => option.impact.mental)}
        ${row("後悔", option => option.impact.regret)}
      </table>
    </div>
  `;
}

function renderActionBlock(data) {
  const checkNow = Array.isArray(data.checkNow) ? data.checkNow : [];
  const nextActions = Array.isArray(data.nextActions) ? data.nextActions : [];

  return `
    <div class="action-block">
      <div class="section-title">今すぐ確認すること</div>
      <div class="section-text">
        ${checkNow.length ? checkNow.map(item => `・${escapeHTML(item)}`).join("<br>") : "・追加で確認すべき条件を整理してください"}
      </div>

      <div class="section-title">次に取る行動</div>
      <div class="section-text">
        ${nextActions.length ? nextActions.map(item => `・${escapeHTML(item)}`).join("<br>") : "・小さく試せる行動を1つ決めてください"}
      </div>

      <div class="note">
        ${escapeHTML(data.note)}
      </div>
    </div>
  `;
}

function escapeHTML(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
